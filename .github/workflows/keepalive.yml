name: Keep Render Alive

on:
  schedule:
    # Every 5 minutes — GitHub Actions cron can lag 5-20 min, so a tight
    # interval maximises the chance we stay under Render's 15-min sleep window.
    - cron: "*/5 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          # Use /health (static JSON, no Supabase dependency) so cold starts
          # don't fail the check.  Allow up to 120s for Render to wake up.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 \
            https://algosplit.onrender.com/health || echo "000")
          echo "Response status: $STATUS"
          # Any response (even a slow one) means the service is alive.
          # Only fail on complete unreachability (curl error → 000).
          if [ "$STATUS" = "000" ]; then
            echo "::warning::Could not reach Render at all"
            exit 1
          fi
