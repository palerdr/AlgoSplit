name: Keep Render Alive

on:
  schedule:
    # Every 14 minutes — keeps the Render free-tier service from sleeping
    # (Render sleeps after 15 min of inactivity)
    - cron: "*/14 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 \
            https://algosplit.onrender.com/keepalive)
          echo "Response status: $STATUS"
          if [ "$STATUS" -ge 500 ]; then
            echo "::warning::Keepalive returned $STATUS"
            exit 1
          fi
