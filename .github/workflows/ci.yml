name: CI

on:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Verify backend lockfile
        run: uv lock --check --project backend

      - name: Install locked backend dependencies
        run: uv sync --project backend --frozen --all-groups

      - name: Verify Rust extension import
        run: uv run --project backend python -c "import analysis_engine_rs"

      - name: Verify Rust analysis engine
        run: |
          cargo fmt --manifest-path backend/rust/analysis_engine/Cargo.toml --check
          cargo clippy --manifest-path backend/rust/analysis_engine/Cargo.toml -- -D warnings
          cargo test --manifest-path backend/rust/analysis_engine/Cargo.toml

      - name: Run backend test suite
        run: |
          uv run --project backend pytest backend/tests --cov=backend --cov-report=term-missing --cov-report=xml

  # NOTE: the previous `frontend-tests` job targeted a `frontend/` directory
  # that never existed in this repo (likely vestige of an earlier layout) and
  # therefore failed setup on every PR. `mobile-tests` below already runs the
  # full `app/` test suite + tsc, so removing it loses no coverage.

  mobile-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install mobile dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck mobile app
        run: npx tsc --noEmit

      - name: Run mobile tests
        run: npm run test:ci
