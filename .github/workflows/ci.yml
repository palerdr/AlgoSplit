name: CI

on:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Install backend dependencies (runtime + dev)
        run: uv sync --frozen --project backend

      - name: Run backend test suite
        run: uv run --project backend pytest backend/tests --cov=backend --cov-report=term-missing --cov-report=xml

  # NOTE: the previous `frontend-tests` job targeted a `frontend/` directory
  # that never existed in this repo (likely vestige of an earlier layout) and
  # therefore failed setup on every PR. `mobile-tests` below already runs the
  # full `app/` test suite + tsc, so removing it loses no coverage.

  mobile-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install mobile dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck mobile app
        run: npx tsc --noEmit

      - name: Run mobile tests
        run: npm run test:ci
