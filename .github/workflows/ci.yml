name: CI

on:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend test suite
        run: |
          pytest backend/tests --cov=backend --cov-report=term-missing --cov-report=xml

  # NOTE: the previous `frontend-tests` job targeted a `frontend/` directory
  # that never existed in this repo (likely vestige of an earlier layout) and
  # therefore failed setup on every PR. `mobile-tests` below already runs the
  # full `app/` test suite + tsc, so removing it loses no coverage.

  mobile-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install mobile dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck mobile app
        run: npx tsc --noEmit

      - name: Run mobile tests
        run: npm run test:ci
