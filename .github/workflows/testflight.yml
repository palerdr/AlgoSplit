# Kicks off an EAS iOS production build for every push to main that touches
# the app, and auto-submits the finished build to TestFlight.
#
# Requirements (one-time setup):
# - EXPO_TOKEN repository secret: an Expo access token with access to this
#   project (expo.dev → Account settings → Access tokens).
# - Apple submission credentials stored with EAS (`eas credentials` /
#   App Store Connect API key), so `--auto-submit` can run unattended.
#
# The job queues the build with --no-wait: EAS builds and submits on its own
# servers, so CI minutes aren't spent waiting the ~20 minutes a build takes.

name: TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/testflight.yml'

concurrency:
  group: testflight
  cancel-in-progress: true

jobs:
  build-and-submit:
    name: EAS iOS build → TestFlight
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Build and submit to TestFlight
        run: eas build --platform ios --profile production --non-interactive --no-wait --auto-submit
        working-directory: app
