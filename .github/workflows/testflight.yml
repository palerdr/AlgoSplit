# Builds an iOS production build for every push to main that touches the app,
# and submits it to TestFlight.
#
# The build runs LOCALLY on the (free, public-repo) macOS runner via
# `eas build --local` — it consumes no EAS-hosted build quota, so the monthly
# free-plan cap can never fail a release again. Credentials, the remote build
# number, and submission still come from EAS/App Store Connect servers.
#
# Requirements (one-time setup, all done):
# - EXPO_TOKEN repository secret: a robot access token for the account that
#   owns @aboufa2322/algosplit (expo.dev → Account settings → Access tokens).
# - The app linked to the EAS project (extra.eas.projectId in app/app.json) —
#   robot tokens cannot run `eas init` themselves.
# - iOS signing credentials stored with EAS (distribution certificate +
#   provisioning profile) and an App Store Connect API key for submission.
#
# The job waits for build and submission so a failure anywhere in the chain
# turns this check red instead of failing silently.

name: TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/testflight.yml'
  # Manual trigger from the Actions tab for rebuilds without a code change.
  workflow_dispatch:

concurrency:
  group: testflight
  cancel-in-progress: true

# Build notifications for the two contributors. Sending requires two more
# repository secrets — GMAIL_USERNAME (a Gmail address) and GMAIL_APP_PASSWORD
# (an app password from myaccount.google.com/apppasswords). Until they exist,
# the email steps skip silently and the pipeline is unaffected. TestFlight
# separately emails testers when a build becomes installable.
env:
  NOTIFY_RECIPIENTS: ab3233@cornell.edu,jdewitte632@gmail.com

jobs:
  build-and-submit:
    name: EAS iOS build → TestFlight
    runs-on: macos-15
    timeout-minutes: 120
    env:
      GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Compute short commit SHA for email subjects
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Email contributors that a build started
        if: ${{ env.GMAIL_APP_PASSWORD != '' }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ env.GMAIL_USERNAME }}
          password: ${{ env.GMAIL_APP_PASSWORD }}
          from: AlgoSplit CI
          to: ${{ env.NOTIFY_RECIPIENTS }}
          subject: 'AlgoSplit commit ${{ env.SHORT_SHA }} building...'
          body: |
            main was updated by ${{ github.actor }} — a TestFlight rebuild is underway.

            ${{ github.event.head_commit.message }}

            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Build and submit to TestFlight
        id: build
        run: |
          eas build --platform ios --profile production --local --non-interactive --output "$RUNNER_TEMP/AlgoSplit.ipa"
          eas submit --platform ios --path "$RUNNER_TEMP/AlgoSplit.ipa" --non-interactive
        working-directory: app

      # !cancelled(): a run superseded by a newer push is not a failure — skip
      # the email instead of sending a misleading ❌.
      - name: Email contributors the result
        if: ${{ !cancelled() && env.GMAIL_APP_PASSWORD != '' }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ env.GMAIL_USERNAME }}
          password: ${{ env.GMAIL_APP_PASSWORD }}
          from: AlgoSplit CI
          to: ${{ env.NOTIFY_RECIPIENTS }}
          subject: "AlgoSplit commit ${{ env.SHORT_SHA }} ${{ steps.build.outcome == 'success' && 'updated in TestFlight' || 'build failed' }}"
          body: |
            ${{ steps.build.outcome == 'success' && 'The new build is submitted — open TestFlight to update the app once Apple finishes processing (usually a few minutes).' || 'The build failed — logs:' }}

            ${{ github.event.head_commit.message }}

            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
