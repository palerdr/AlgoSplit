# Builds an EAS iOS production build for every push to main that touches
# the app, and auto-submits the finished build to TestFlight.
#
# Requirements (one-time setup, all done):
# - EXPO_TOKEN repository secret: a robot access token for the account that
#   owns @aboufa2322/algosplit (expo.dev → Account settings → Access tokens).
# - The app linked to the EAS project (extra.eas.projectId in app/app.json) —
#   robot tokens cannot run `eas init` themselves.
# - iOS signing credentials stored with EAS (distribution certificate +
#   provisioning profile) and an App Store Connect API key for `--auto-submit`.
#
# The job waits for the EAS build and submission so a failure anywhere in the
# chain turns this check red instead of failing silently on expo.dev.

name: TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/testflight.yml'

concurrency:
  group: testflight
  cancel-in-progress: true

# Build notifications for the two contributors. Sending requires two more
# repository secrets — GMAIL_USERNAME (a Gmail address) and GMAIL_APP_PASSWORD
# (an app password from myaccount.google.com/apppasswords). Until they exist,
# the email steps skip silently and the pipeline is unaffected. TestFlight
# separately emails testers when a build becomes installable.
env:
  NOTIFY_RECIPIENTS: ab3233@cornell.edu,jdewitte632@gmail.com

jobs:
  build-and-submit:
    name: EAS iOS build → TestFlight
    runs-on: ubuntu-latest
    # EAS free-tier builds queue serially; leave room for a build ahead of us.
    timeout-minutes: 120
    env:
      GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Email contributors that a build started
        if: ${{ env.GMAIL_APP_PASSWORD != '' }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ env.GMAIL_USERNAME }}
          password: ${{ env.GMAIL_APP_PASSWORD }}
          from: AlgoSplit CI
          to: ${{ env.NOTIFY_RECIPIENTS }}
          subject: '🏗 AlgoSplit TestFlight build started'
          body: |
            A new AlgoSplit iOS build was triggered by a push to main.

            Commit: ${{ github.event.head_commit.message }}
            Author: ${{ github.actor }}
            SHA: ${{ github.sha }}

            Follow along:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            https://expo.dev/accounts/aboufa2322/projects/algosplit/builds

      - name: Build and submit to TestFlight
        id: build
        run: eas build --platform ios --profile production --non-interactive --auto-submit
        working-directory: app

      - name: Email contributors the result
        if: ${{ always() && env.GMAIL_APP_PASSWORD != '' }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ env.GMAIL_USERNAME }}
          password: ${{ env.GMAIL_APP_PASSWORD }}
          from: AlgoSplit CI
          to: ${{ env.NOTIFY_RECIPIENTS }}
          subject: ${{ steps.build.outcome == 'success' && '✅ AlgoSplit build submitted to TestFlight' || '❌ AlgoSplit TestFlight build failed' }}
          body: |
            Build ${{ steps.build.outcome == 'success' && 'succeeded and was submitted to TestFlight — it will be installable once Apple finishes processing.' || 'failed — see the logs below.' }}

            Commit: ${{ github.event.head_commit.message }}
            Author: ${{ github.actor }}
            SHA: ${{ github.sha }}

            Logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            https://expo.dev/accounts/aboufa2322/projects/algosplit/builds
