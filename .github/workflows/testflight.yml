# Builds the latest iOS production revision pushed to main that touches the
# app, and submits it to TestFlight. A newer revision deliberately supersedes
# an older in-flight release so stale binaries are never uploaded afterward.
#
# The build runs LOCALLY on the (free, public-repo) macOS runner via
# `eas build --local` — it consumes no EAS-hosted build quota, so the monthly
# free-plan cap can never fail a release again. Credentials, the remote build
# number, and submission still come from EAS/App Store Connect servers.
#
# Requirements (one-time setup, all done):
# - EXPO_TOKEN repository secret: a robot access token for the account that
#   owns @aboufa2322/algosplit (expo.dev → Account settings → Access tokens).
# - The app linked to the EAS project (extra.eas.projectId in app/app.json) —
#   robot tokens cannot run `eas init` themselves.
# - iOS signing credentials stored with EAS (distribution certificate +
#   one provisioning profile per native target) and an App Store Connect API
#   key for submission. Every new target or entitlement must be provisioned
#   interactively, then recorded in app/ios-signing-targets.json. CI validates
#   that ledger before consuming a remote build number.
#
# Optional — needed only for the "now available" email (see below):
# - ASC_KEY_ID / ASC_ISSUER_ID / ASC_PRIVATE_KEY repository secrets: a
#   *separate* App Store Connect API key (Users and Access → Integrations →
#   App Store Connect API on appstoreconnect.apple.com), used to poll build
#   processing status. ASC_PRIVATE_KEY is the full contents of the
#   downloaded .p8 file. Until these exist, that step skips cleanly and the
#   "available" email never fires — the build
#   and submission themselves are unaffected.
#
# The build+submit job itself waits and fails loudly, so a break anywhere in
# that chain turns this check red instead of failing silently.

name: TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/testflight.yml'
  # Manual trigger from the Actions tab for rebuilds without a code change.
  workflow_dispatch:

concurrency:
  # A dispatch from a non-main ref must never cancel the real main release.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Exactly two contributor emails: one when a build starts, one when Apple has
# actually finished processing it and it's installable — never merely when
# our own submit step finishes uploading. A third, failure-only email covers
# the build/submit step breaking outright. Sending requires GMAIL_USERNAME
# and GMAIL_APP_PASSWORD repository secrets (an app password from
# myaccount.google.com/apppasswords); until they exist, email steps skip
# silently and the pipeline is unaffected.
env:
  NOTIFY_RECIPIENTS: ab3233@cornell.edu,jdewitte632@gmail.com

jobs:
  build-and-submit:
    if: ${{ github.ref == 'refs/heads/main' }}
    name: EAS iOS build → TestFlight
    runs-on: macos-15
    timeout-minutes: 120
    concurrency:
      # Serialize the release with the weekly signed canary so both can safely
      # read the shared remote iOS build-number state.
      group: ios-production-signing
      cancel-in-progress: false
    env:
      GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: 21.0.2
          token: ${{ secrets.EXPO_TOKEN }}

      # The runner ships several Xcode versions side by side; the default is
      # older than what Apple currently requires for submission ("built with
      # the iOS 26 SDK or later, included in Xcode 26 or later"). Build
      # against the newest one installed instead of the runner's default.
      - name: Select newest available Xcode
        run: |
          ls -d /Applications/Xcode*.app
          LATEST_XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)
          echo "Selecting ${LATEST_XCODE:-/Applications/Xcode.app}"
          sudo xcode-select -s "${LATEST_XCODE:-/Applications/Xcode.app}/Contents/Developer"
          xcodebuild -version

      - name: Install dependencies
        run: npm ci
        working-directory: app

      # Resolve config exactly as EAS Build will, then compare every native
      # signing target and entitlement with the checked-in credential ledger.
      # This blocks unreviewed native-target drift and known expiry windows
      # before EAS increments the remote build number. The signed build below
      # remains the live Apple/EAS credential check.
      - name: Validate iOS signing inventory
        run: |
          eas config --platform ios --profile production --json --non-interactive > "$RUNNER_TEMP/eas-ios-production.json"
          eas env:exec production "npm run validate:ios-signing -- '$RUNNER_TEMP/eas-ios-production.json' && npm run validate:ios-native-targets" --non-interactive
        working-directory: app

      # Keep code, tests, and the production iOS bundle ahead of the expensive
      # signed archive. None of these checks consume an Apple build number.
      - name: Verify app before release build
        run: |
          npx tsc --noEmit
          npm run test:ci
          npx expo export --platform ios --output-dir "$RUNNER_TEMP/expo-ios-export"
        working-directory: app

      # Build-cadence telemetry for the "started"/"failed" emails: how many
      # pipeline runs happened today and this month. Never fails the build.
      - name: Count pipeline runs today and this month
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(date -u +%Y-%m-%dT00:00:00Z)
          MONTH=$(date -u +%Y-%m-01T00:00:00Z)
          BUILDS_TODAY=$(gh api -X GET "repos/${GITHUB_REPOSITORY}/actions/workflows/testflight.yml/runs" -f "created=>=${TODAY}" -F per_page=1 --jq '.total_count' || echo '?')
          BUILDS_MONTH=$(gh api -X GET "repos/${GITHUB_REPOSITORY}/actions/workflows/testflight.yml/runs" -f "created=>=${MONTH}" -F per_page=1 --jq '.total_count' || echo '?')
          echo "BUILDS_TODAY=${BUILDS_TODAY}" >> "$GITHUB_ENV"
          echo "BUILDS_MONTH=${BUILDS_MONTH}" >> "$GITHUB_ENV"

      - name: Email contributors that a build started
        if: ${{ env.GMAIL_USERNAME != '' && env.GMAIL_APP_PASSWORD != '' }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ env.GMAIL_USERNAME }}
          password: ${{ env.GMAIL_APP_PASSWORD }}
          from: 'AlgoSplit CI <${{ env.GMAIL_USERNAME }}>'
          to: ${{ env.NOTIFY_RECIPIENTS }}
          subject: 'AlgoSplit build started'
          body: |
            main was updated by ${{ github.actor }} — a TestFlight rebuild is underway.

            ${{ github.event.head_commit.message }}

            Build ${{ env.BUILDS_TODAY }} today · ${{ env.BUILDS_MONTH }} this month
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Build and submit to TestFlight
        id: build
        run: |
          set +e
          set -o pipefail
          eas build --platform ios --profile production --local --non-interactive --output "$RUNNER_TEMP/AlgoSplit.ipa" 2>&1 | tee "$RUNNER_TEMP/eas-ios-build.log"
          BUILD_STATUS=${PIPESTATUS[0]}
          set -e

          if [ "$BUILD_STATUS" -ne 0 ]; then
            if grep -Eiq 'Credentials are not set up|Failed to set up credentials|require separate Provisioning Profiles|Provisioning profile is not configured correctly' "$RUNNER_TEMP/eas-ios-build.log"; then
              echo "::error title=iOS signing credentials missing::EAS is missing build credentials for one or more iOS targets. From app/, run: npx eas-cli@21.0.2 credentials:configure-build --platform ios --profile production. Configure every target, update app/ios-signing-targets.json, then rerun TestFlight."
            fi
            exit "$BUILD_STATUS"
          fi

          eas submit --platform ios --path "$RUNNER_TEMP/AlgoSplit.ipa" --non-interactive
        working-directory: app

      - name: Read app version and build number
        if: ${{ steps.build.outcome == 'success' }}
        run: |
          echo "APP_VERSION=$(node -p "require('./app.json').expo.version")" >> "$GITHUB_ENV"
          echo "IOS_BUILD_NUMBER=$(eas build:version:get --platform ios --non-interactive 2>&1 | grep -oE 'buildNumber - [0-9]+' | grep -oE '[0-9]+')" >> "$GITHUB_ENV"
          echo "ASC_APP_ID=$(node -p "require('./eas.json').submit.production.ios.ascAppId")" >> "$GITHUB_ENV"
        working-directory: app

      # App Store processing polling needs a separately downloadable ASC key;
      # the EAS-managed submission key cannot be exported. Treat absent
      # optional polling credentials as an intentional skip, not a red error
      # annotation on an otherwise successful release.
      - name: Detect optional Apple processing credentials
        if: ${{ steps.build.outcome == 'success' }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          if [[ -n "$ASC_KEY_ID" && -n "$ASC_ISSUER_ID" && -n "$ASC_PRIVATE_KEY" ]]; then
            echo "ASC_POLLING_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "ASC_POLLING_ENABLED=false" >> "$GITHUB_ENV"
            echo "::notice title=Apple processing poll skipped::ASC polling secrets are optional and are not configured; the signed upload and TestFlight submission remain verified by EAS Submit."
          fi

      # Apple's own processing, not "eas submit succeeded" — that only means
      # the upload went through. continue-on-error: a stuck/misconfigured
      # poll must not turn an otherwise-successful build red.
      - name: Wait for Apple to finish TestFlight processing
        id: wait_for_processing
        if: ${{ steps.build.outcome == 'success' && env.ASC_POLLING_ENABLED == 'true' }}
        continue-on-error: true
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          ASC_APP_ID: ${{ env.ASC_APP_ID }}
          BUILD_NUMBER: ${{ env.IOS_BUILD_NUMBER }}
        run: node .github/scripts/wait-for-testflight-build.mjs

      - name: Email contributors that the build is available
        if: ${{ steps.wait_for_processing.outcome == 'success' && env.GMAIL_USERNAME != '' && env.GMAIL_APP_PASSWORD != '' }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ env.GMAIL_USERNAME }}
          password: ${{ env.GMAIL_APP_PASSWORD }}
          from: 'AlgoSplit CI <${{ env.GMAIL_USERNAME }}>'
          to: ${{ env.NOTIFY_RECIPIENTS }}
          subject: 'AlgoSplit v${{ env.APP_VERSION }} (${{ env.IOS_BUILD_NUMBER }}) is now available'
          body: |
            AlgoSplit v${{ env.APP_VERSION }} (${{ env.IOS_BUILD_NUMBER }}) is now available in TestFlight.

            ${{ github.event.head_commit.message }}

      # !cancelled(): a run superseded by a newer push is not a failure. The
      # Apple-processing poll is continue-on-error, so it cannot trip this;
      # config, test, bundle, signing, build, and submit failures all do.
      - name: Email contributors that the build failed
        if: ${{ failure() && !cancelled() && env.GMAIL_USERNAME != '' && env.GMAIL_APP_PASSWORD != '' }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ env.GMAIL_USERNAME }}
          password: ${{ env.GMAIL_APP_PASSWORD }}
          from: 'AlgoSplit CI <${{ env.GMAIL_USERNAME }}>'
          to: ${{ env.NOTIFY_RECIPIENTS }}
          subject: 'AlgoSplit build failed'
          body: |
            The release pipeline failed before this revision became available in TestFlight.

            ${{ github.event.head_commit.message }}

            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
