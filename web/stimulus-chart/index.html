<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Weekly Stimulus — AlgoSplit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <article class="card" aria-labelledby="chart-title">
        <header class="card-head">
          <p class="eyebrow">AlgoSplit</p>
          <h1 id="chart-title">Weekly Stimulus</h1>
          <p class="subtitle">
            Net stimulus across major muscle groups, scored 0–7.
          </p>
        </header>

        <dl class="chart">
          <div class="row" data-level="7" style="--level: 7; --idx: 0">
            <dt>Quads</dt>
            <dd>
              <span class="track" aria-hidden="true"><span class="bar"></span></span>
              <span class="value">7</span>
            </dd>
          </div>
          <div class="row" data-level="6" style="--level: 6; --idx: 1">
            <dt>Chest</dt>
            <dd>
              <span class="track" aria-hidden="true"><span class="bar"></span></span>
              <span class="value">6</span>
            </dd>
          </div>
          <div class="row" data-level="6" style="--level: 6; --idx: 2">
            <dt>Back</dt>
            <dd>
              <span class="track" aria-hidden="true"><span class="bar"></span></span>
              <span class="value">6</span>
            </dd>
          </div>
          <div class="row" data-level="5" style="--level: 5; --idx: 3">
            <dt>Shoulders</dt>
            <dd>
              <span class="track" aria-hidden="true"><span class="bar"></span></span>
              <span class="value">5</span>
            </dd>
          </div>
          <div class="row" data-level="4" style="--level: 4; --idx: 4">
            <dt>Hamstrings</dt>
            <dd>
              <span class="track" aria-hidden="true"><span class="bar"></span></span>
              <span class="value">4</span>
            </dd>
          </div>
          <div class="row" data-level="3" style="--level: 3; --idx: 5">
            <dt>Biceps</dt>
            <dd>
              <span class="track" aria-hidden="true"><span class="bar"></span></span>
              <span class="value">3</span>
            </dd>
          </div>
          <div class="row" data-level="3" style="--level: 3; --idx: 6">
            <dt>Triceps</dt>
            <dd>
              <span class="track" aria-hidden="true"><span class="bar"></span></span>
              <span class="value">3</span>
            </dd>
          </div>
          <div class="row" data-level="1" style="--level: 1; --idx: 7">
            <dt>Calves</dt>
            <dd>
              <span class="track" aria-hidden="true"><span class="bar"></span></span>
              <span class="value">1</span>
            </dd>
          </div>
        </dl>

        <footer class="legend" aria-label="Stimulus scale">
          <span class="legend-label">Low</span>
          <span class="legend-scale" role="presentation"></span>
          <span class="legend-label">High</span>
        </footer>
      </article>
    </main>
  </body>
</html>
