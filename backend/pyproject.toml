[project]
name = "algosplit-backend"
version = "1.0.0"
description = "AlgoSplit FastAPI backend: workout split analysis and optimization."
requires-python = ">=3.12"
dependencies = [
    "numpy>=1.24.0",
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "python-multipart>=0.0.6",
    "pydantic>=2.5.0",
    "pydantic-settings>=2.1.0",
    "email-validator>=2.1.0",
    "supabase>=2.3.0",
    "python-jose[cryptography]>=3.3.0",
    "python-dotenv>=1.0.0",
    "redis>=5.0.0",
]

[dependency-groups]
dev = [
    "pytest>=7.4.3",
    "pytest-cov>=5.0.0",
    "httpx>=0.25.2",
]

[tool.uv]
# Render and the CI fallback path still consume requirements.txt — keep it
# regenerated from the lockfile via `uv export` (see scripts/sync-requirements.sh).
package = false
